[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  functions = "netlify/functions"

# Scheduled functions are configured in the function files themselves
# using the @netlify/functions schedule() export
# Note: Scheduled functions require Netlify Pro plan or higher

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/validate"
  to = "/.netlify/functions/auth-validate"
  status = 200

[[redirects]]
  from = "/api/games/current-week"
  to = "/.netlify/functions/games-current-week"
