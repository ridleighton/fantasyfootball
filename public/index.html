<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="down bad — NFL Pick'ems & Sports Trivia">
  <meta name="theme-color" content="#0d0a14">

  <!-- Open Graph -->
  <meta property="og:title" content="down bad ↓">
  <meta property="og:description" content="NFL pick'ems & trivia for the obsessed">
  <meta property="og:type" content="website">

  <title>down bad ↓</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles — new design system first, then legacy page styles -->
  <link rel="stylesheet" href="/styles/down-bad.css">
  <link rel="stylesheet" href="/styles/main.css?v=11">
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <nav id="navigation"></nav>
    <main id="main-content"></main>
    <footer class="db-footer">
      not affiliated with ghost energy, taylor swift, the nfl, or anyone referenced on this site. just big fans of all of them.
    </footer>
  </div>

  <!-- Ghost loading overlay (replaces old spinner) -->
  <div id="db-loading" class="db-loading" style="display:none">
    <div class="db-loading-inner">
      <div id="db-loading-ghost"></div>
      <p class="db-loading-text">loading…</p>
    </div>
  </div>

  <!-- Modal & Toast containers -->
  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <!-- Utils -->
  <script src="/js/utils/storage.js?v=11"></script>
  <script src="/js/utils/timezone.js?v=11"></script>
  <script src="/js/utils/colors.js?v=11"></script>
  <script src="/js/utils/game-sync.js?v=11"></script>

  <!-- Core -->
  <script src="/js/api.js?v=11"></script>
  <script src="/js/auth.js?v=11"></script>

  <!-- Components -->
  <script src="/js/components/mascots.js?v=11"></script>
  <script src="/js/components/navbar.js?v=11"></script>
  <script src="/js/components/modal.js?v=11"></script>
  <script src="/js/components/game-card.js?v=11"></script>
  <script src="/js/components/leaderboard.js?v=11"></script>

  <!-- Pages -->
  <script src="/js/pages/home.js?v=11"></script>
  <script src="/js/pages/picks-unified.js?v=11"></script>
  <script src="/js/pages/profile.js?v=11"></script>
  <script src="/js/pages/admin.js?v=11"></script>
  <script src="/js/pages/compare-picks.js?v=11"></script>

  <!-- App bootstrap -->
  <script src="/js/app.js?v=11"></script>

  <script>
    // Theme toggle helper (persisted in localStorage)
    (function () {
      const saved = localStorage.getItem('db-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    })();

    // Loading ghost spinner
    window.showLoading = function (text) {
      const el = document.getElementById('db-loading');
      const ghost = document.getElementById('db-loading-ghost');
      if (el) {
        if (ghost && window.Mascots) ghost.innerHTML = Mascots.dizzy(100);
        const p = el.querySelector('.db-loading-text');
        if (p) p.textContent = text || 'loading…';
        el.style.display = 'grid';
      }
    };

    window.hideLoading = function () {
      const el = document.getElementById('db-loading');
      if (el) el.style.display = 'none';
    };
  </script>
</body>
</html>
